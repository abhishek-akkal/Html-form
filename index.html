<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <header>
        <h1>User Registration Page</h1>
    </header>
    <form action="mailto:akkalabhishek@gmail.com?subject=Form Submission" method="post" enctype="text/plain">
        <table>
            <tr>
                <td><label>Enter your name</label></td>
                <td><input type="text" name="Name" placeholder="Enter your name" required></td>
            </tr>
            <tr>
                <td><label>Enter your Email ID</label></td>
                <td><input type="email" name="Email" placeholder="Enter your Email" required></td>
            </tr>
            <tr>
                <td><label>Enter your password</label></td>
                <td><input type="password" name="password" placeholder="Enter your password" required></td>
            </tr>
            <tr>
                <td><label>Confirm your password</label></td>
                <td><input type="password" name="password" placeholder="Confirm your password" required></td>
            </tr>
        </table>
        <br><br>
        <label type="select">Select your gender</label>
        <br>
        <input type="radio" name="Gender" value="Male" required>Male <br>
        <input type="radio" name="Gender" value="Female" required>Female <br>
        <input type="radio" name="Gender" value="Other" required>other <br><br>
        <br>
        <label for="Date of Birth">Date of Birth:</label>
        <input type="date" id="dob" name="Date of Birth" required>
        <br><br>
        <select name="City" id="city" required>
            <option value="">Select your city</option>
            <option value="Pune">Pune</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Delhi">Delhi</option>
            <option value="Bangalore">Bangalore</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Chennai">Chennai</option>
            <option value="Kolkata">Kolkata</option>
            <option value="Ahmedabad">Ahmedabad</option>
            <option value="Indore">Indore</option>
            <option value="Visakhapatnam">Visakhapatnam</option>
        </select>
        <br><br>
        <label>Enter your address:</label><br>
        <textarea rows="4" cols="30" name="Address" placeholder="Enter your address" required></textarea>
        <br><br>
        <button type="submit">Submit</button>
    </form>
</body>

</html>
